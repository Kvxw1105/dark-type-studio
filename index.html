<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dark Type Studio</title><style>
*{box-sizing:border-box}body{margin:0;background:#07080a;color:#fff;font-family:Inter,"Microsoft YaHei",sans-serif} .app{display:grid;grid-template-columns:240px 1fr 280px;min-height:100vh;gap:16px;padding:16px}.panel{background:#111216;border:1px solid #292b31;border-radius:18px;padding:18px}.brand{font-size:22px;font-weight:900}.red{color:#ff3b30}.templates button,button{width:100%;padding:12px;margin:8px 0;background:#181a20;color:#fff;border:1px solid #333;border-radius:10px;cursor:pointer}.canvas{display:flex;align-items:center;justify-content:center}.poster{width:min(70vw,600px);aspect-ratio:1;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}.top{color:#f33;font-size:24px}.title{font-size:80px;font-weight:1000;line-height:1.05}.sub{font-size:22px;color:#ddd;margin-top:20px}.seal{margin-top:30px;background:#b00;border-radius:50%;padding:15px}.field{margin-bottom:14px}.field input{width:100%;padding:10px;background:#090a0c;border:1px solid #333;color:white;border-radius:8px}@media(max-width:900px){.app{grid-template-columns:1fr}.title{font-size:52px}}
</style></head><body><div class="app"><aside class="panel"><div class="brand">暗幕<span class="red">排版台</span></div><p>Dark Type Studio</p><div class="templates"><button onclick="setType('cover')">主页封面</button><button onclick="setType('video')">视频开头</button></div></aside><main class="panel canvas"><div class="poster"><div class="top" id="top">2026算法改版后</div><div class="title" id="title">推流<br>机制</div><div class="sub" id="sub">看懂平台如何分配流量</div><div class="seal">密</div></div></main><aside class="panel"><div class="field">顶部<input id="topIn" value="2026算法改版后"></div><div class="field">标题<input id="titleIn" value="推流 机制"></div><div class="field">副标题<input id="subIn" value="看懂平台如何分配流量"></div><button onclick="save()">导出功能预留</button></aside></div><script>const ids=['top','title','sub'];const ins=['topIn','titleIn','subIn'];ins.forEach((x,i)=>document.getElementById(x).oninput=e=>document.getElementById(ids[i]).innerHTML=e.target.value.replace(/ /g,'<br>'));function setType(t){if(t==='video'){titleIn.value='详解推流机制';subIn.value='完整逻辑拆解';}else{titleIn.value='推流 机制';subIn.value='看懂平台如何分配流量'}ins.forEach(x=>document.getElementById(x).dispatchEvent(new Event('input')))}function save(){alert('高清导出模块开发中')}</script></body></html>
